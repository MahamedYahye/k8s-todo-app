<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo App</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: sans-serif; background: #f5f5f5; display: flex; justify-content: center; padding: 40px 16px; }
    .container { background: white; border-radius: 12px; padding: 32px; width: 100%; max-width: 480px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    h1 { font-size: 24px; margin-bottom: 24px; color: #1a1a1a; }
    .input-row { display: flex; gap: 8px; margin-bottom: 24px; }
    input[type=text] { flex: 1; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; }
    button { padding: 10px 18px; background: #4f46e5; color: white; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; }
    button:hover { background: #4338ca; }
    .todo-list { list-style: none; }
    .todo-item { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid #f0f0f0; }
    .todo-item span { flex: 1; font-size: 15px; color: #333; }
    .todo-item.done span { text-decoration: line-through; color: #aaa; }
    .delete-btn { background: #fee2e2; color: #dc2626; padding: 4px 10px; font-size: 13px; border-radius: 6px; border: none; cursor: pointer; }
    .empty { color: #aaa; font-size: 14px; text-align: center; padding: 24px 0; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Todo App</h1>
    <div class="input-row">
      <input id="todo-input" type="text" placeholder="Nieuwe taak..." onkeydown="if(event.key==='Enter')addTodo()">
      <button onclick="addTodo()">Voeg toe</button>
    </div>
    <ul class="todo-list" id="todo-list">
      <li class="empty" id="empty-msg">Geen taken</li>
    </ul>
  </div>
  <script>
    const API = '/api';
    async function loadTodos() {
      const res = await fetch(API + '/todos');
      const todos = await res.json();
      renderTodos(todos);
    }
    function renderTodos(todos) {
      const list = document.getElementById('todo-list');
      list.innerHTML = '';
      if (!todos.length) { list.innerHTML = '<li class="empty">Geen taken</li>'; return; }
      todos.forEach(t => {
        const li = document.createElement('li');
        li.className = 'todo-item' + (t.done ? ' done' : '');
        li.innerHTML = '<input type="checkbox"' + (t.done ? ' checked' : '') + ' onchange="toggleTodo(' + t.id + ')">'
          + '<span>' + t.title + '</span>'
          + '<button class="delete-btn" onclick="deleteTodo(' + t.id + ')">Verwijder</button>';
        list.appendChild(li);
      });
    }
    async function addTodo() {
      const input = document.getElementById('todo-input');
      if (!input.value.trim()) return;
      await fetch(API + '/todos', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({title: input.value}) });
      input.value = ''; loadTodos();
    }
    async function toggleTodo(id) {
      await fetch(API + '/todos/' + id + '/toggle', { method: 'PUT' }); loadTodos();
    }
    async function deleteTodo(id) {
      await fetch(API + '/todos/' + id, { method: 'DELETE' }); loadTodos();
    }
    loadTodos();
  </script>
</body>
</html>
